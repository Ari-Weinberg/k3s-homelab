apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-values
  namespace: kube-system
data:
  values.yaml: |
    kubeProxyReplacement: true
    k8sServiceHost: 10.2.10.10
    k8sServicePort: 6443
    gatewayAPI:
      enabled: true
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
