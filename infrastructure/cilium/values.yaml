# Manual bootstrap reference — used with:
#   helm install cilium cilium/cilium --namespace kube-system -f values.yaml
# In normal operation, Flux manages the release via helmrelease.yaml + configmap.yaml

kubeProxyReplacement: true

k8sServiceHost: 10.2.10.10
k8sServicePort: 6443

gatewayAPI:
  enabled: true

hubble:
  relay:
    enabled: true
  ui:
    enabled: true
